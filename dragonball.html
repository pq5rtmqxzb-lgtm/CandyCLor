let AC;
function ensureAudio(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();}
function tone(f,d,tp,v,sl){
  if(!AC)return;try{
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=tp||'sine';o.frequency.setValueAtTime(f,AC.currentTime);
  if(sl)o.frequency.linearRampToValueAtTime(f+sl,AC.currentTime+d);
  g.gain.setValueAtTime(v||0.12,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d);
  }catch(e){}}
function sndSwap(){tone(500,.08);tone(700,.08);}
function sndMatch(){tone(600,.12);setTimeout(()=>tone(800,.12),50);setTimeout(()=>tone(1000,.1),100);}
function sndCombo(){tone(400,.2,'sawtooth',.08);tone(800,.2,'sine',.1);tone(1200,.15,'sine',.1);}
function sndWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.3,'sine',.13),i*130));}
function sndLose(){[400,350,300,200].forEach((f,i)=>setTimeout(()=>tone(f,.3,'sine',.1),i*160));}
function sndSpecial(){tone(200,.4,'sawtooth',.1,900);tone(500,.3,'sine',.12);}
function sndClick(){tone(900,.04,'sine',.08);}

function drawGoku(ctx,cx,cy,sz){
  const r=sz*.42;
  // Neck
  ctx.fillStyle='#FDBCB4';
  ctx.fillRect(cx-r*.2,cy+r*.45,r*.4,r*.38);
  // Orange gi
  ctx.fillStyle='#FF6D00';
  ctx.beginPath();ctx.moveTo(cx-r*.65,cy+r*.85);ctx.lineTo(cx+r*.65,cy+r*.85);
  ctx.lineTo(cx+r*.5,cy+r*.42);ctx.lineTo(cx,cy+r*.58);ctx.lineTo(cx-r*.5,cy+r*.42);
  ctx.closePath();ctx.fill();
  // Blue undershirt V
  ctx.fillStyle='#1565C0';
  ctx.beginPath();ctx.moveTo(cx-r*.22,cy+r*.48);ctx.lineTo(cx,cy+r*.62);ctx.lineTo(cx+r*.22,cy+r*.48);
  ctx.lineTo(cx+r*.15,cy+r*.85);ctx.lineTo(cx-r*.15,cy+r*.85);ctx.closePath();ctx.fill();
  // Face
  ctx.fillStyle='#FDBCB4';
  ctx.beginPath();ctx.arc(cx,cy,r*.6,0,Math.PI*2);ctx.fill();
  // Hair base
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(cx,cy-r*.08,r*.64,Math.PI,0);ctx.fill();
  // Spikes
  const spks=[[-0.5,-1.15],[-0.25,-1.35],[-0.02,-1.48],[0.2,-1.32],[0.4,-1.15],[0.55,-0.9]];
  spks.forEach((s,i)=>{
    ctx.beginPath();
    ctx.moveTo(cx+s[0]*r-r*.08,cy-r*.5);
    ctx.quadraticCurveTo(cx+s[0]*r,cy+s[1]*r*.9,cx+s[0]*r+r*.05,cy+s[1]*r);
    ctx.quadraticCurveTo(cx+s[0]*r+r*.15,cy+s[1]*r*.8,cx+s[0]*r+r*.18,cy-r*.5);
    ctx.closePath();ctx.fill();
  });
  // Side hair
  ctx.beginPath();ctx.moveTo(cx-r*.6,cy-r*.08);ctx.quadraticCurveTo(cx-r*.82,cy-r*.15,cx-r*.7,cy+r*.2);ctx.lineTo(cx-r*.55,cy+r*.05);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(cx+r*.6,cy-r*.08);ctx.quadraticCurveTo(cx+r*.82,cy-r*.15,cx+r*.7,cy+r*.2);ctx.lineTo(cx+r*.55,cy+r*.05);ctx.closePath();ctx.fill();
  // Eyes whites
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(cx-r*.2,cy+r*.02,r*.13,r*.1,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+r*.2,cy+r*.02,r*.13,r*.1,0,0,Math.PI*2);ctx.fill();
  // Pupils
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(cx-r*.18,cy+r*.03,r*.065,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+r*.18,cy+r*.03,r*.065,0,Math.PI*2);ctx.fill();
  // Highlights
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(cx-r*.16,cy,r*.025,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+r*.2,cy,r*.025,0,Math.PI*2);ctx.fill();
  // Eyebrows
  ctx.strokeStyle='#111';ctx.lineWidth=r*.06;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cx-r*.32,cy-r*.12);ctx.lineTo(cx-r*.08,cy-r*.15);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+r*.08,cy-r*.15);ctx.lineTo(cx+r*.32,cy-r*.12);ctx.stroke();
  ctx.lineCap='butt';
  // Mouth smile
  ctx.strokeStyle='#8B4513';ctx.lineWidth=r*.04;
  ctx.beginPath();ctx.arc(cx,cy+r*.15,r*.14,.15,Math.PI-.15);ctx.stroke();
}

function drawVegeta(ctx,cx,cy,sz){
  const r=sz*.42;
  ctx.fillStyle='#FDBCB4';ctx.fillRect(cx-r*.18,cy+r*.45,r*.36,r*.38);
  // Armor
  ctx.fillStyle='#F5F5F5';
  ctx.beginPath();ctx.moveTo(cx-r*.7,cy+r*.85);ctx.lineTo(cx+r*.7,cy+r*.85);ctx.lineTo(cx+r*.5,cy+r*.42);ctx.lineTo(cx-r*.5,cy+r*.42);ctx.closePath();ctx.fill();
  // Yellow shoulder pads
  ctx.fillStyle='#FDD835';
  ctx.beginPath();ctx.ellipse(cx-r*.55,cy+r*.52,r*.2,r*.14,-.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+r*.55,cy+r*.52,r*.2,r*.14,.3,0,Math.PI*2);ctx.fill();
  // Dark bodysuit neckline
  ctx.fillStyle='#1A237E';
  ctx.beginPath();ctx.moveTo(cx-r*.2,cy+r*.42);ctx.lineTo(cx+r*.2,cy+r*.42);ctx.lineTo(cx+r*.15,cy+r*.85);ctx.lineTo(cx-r*.15,cy+r*.85);ctx.closePath();ctx.fill();
  // Face
  ctx.fillStyle='#FDBCB4';ctx.beginPath();ctx.arc(cx,cy+r*.05,r*.55,0,Math.PI*2);ctx.fill();
  // Flame hair
  ctx.fillStyle='#111';
  // Widow's peak fills
  ctx.beginPath();
  ctx.moveTo(cx-r*.55,cy-r*.12);
  ctx.lineTo(cx-r*.48,cy-r*.55);ctx.lineTo(cx-r*.38,cy-r*.45);
  ctx.lineTo(cx-r*.33,cy-r*.82);ctx.lineTo(cx-r*.18,cy-r*.58);
  ctx.lineTo(cx-r*.12,cy-r*1.1);ctx.lineTo(cx,cy-r*.62);
  ctx.lineTo(cx+r*.08,cy-r*1.18);ctx.lineTo(cx+r*.18,cy-r*.65);
  ctx.lineTo(cx+r*.22,cy-r*1.02);ctx.lineTo(cx+r*.32,cy-r*.55);
  ctx.lineTo(cx+r*.38,cy-r*.78);ctx.lineTo(cx+r*.45,cy-r*.48);
  ctx.lineTo(cx+r*.52,cy-r*.52);ctx.lineTo(cx+r*.55,cy-r*.12);
  ctx.closePath();ctx.fill();
  // Widow's peak triangle
  ctx.beginPath();ctx.moveTo(cx-r*.38,cy-r*.18);ctx.lineTo(cx,cy+r*.02);ctx.lineTo(cx+r*.38,cy-r*.18);
  ctx.lineTo(cx+r*.55,cy-r*.12);ctx.arc(cx,cy-r*.02,r*.55,-.22,Math.PI+.22,true);ctx.closePath();ctx.fill();
  // Eyes
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(cx-r*.2,cy+r*.06,r*.11,r*.08,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+r*.2,cy+r*.06,r*.11,r*.08,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(cx-r*.18,cy+r*.07,r*.055,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+r*.18,cy+r*.07,r*.055,0,Math.PI*2);ctx.fill();
  // Stern brows
  ctx.strokeStyle='#111';ctx.lineWidth=r*.08;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cx-r*.34,cy-r*.02);ctx.lineTo(cx-r*.08,cy-r*.08);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+r*.08,cy-r*.08);ctx.lineTo(cx+r*.34,cy-r*.02);ctx.stroke();
  ctx.lineCap='butt';
  // Frown
  ctx.strokeStyle='#8B4513';ctx.lineWidth=r*.04;
  ctx.beginPath();ctx.moveTo(cx-r*.1,cy+r*.28);ctx.lineTo(cx+r*.1,cy+r*.28);ctx.stroke();
}

function drawGohan(ctx,cx,cy,sz){
  const r=sz*.42;
  ctx.fillStyle='#FDBCB4';ctx.fillRect(cx-r*.18,cy+r*.45,r*.36,r*.35);
  // Purple gi
  ctx.fillStyle='#7B1FA2';
  ctx.beginPath();ctx.moveTo(cx-r*.6,cy+r*.85);ctx.lineTo(cx+r*.6,cy+r*.85);ctx.lineTo(cx+r*.45,cy+r*.42);ctx.lineTo(cx-r*.45,cy+r*.42);ctx.closePath();ctx.fill();
  // Red belt
  ctx.fillStyle='#D32F2F';ctx.fillRect(cx-r*.45,cy+r*.64,r*.9,r*.1);
  // Face rounder
  ctx.fillStyle='#FDBCB4';ctx.beginPath();ctx.arc(cx,cy+r*.05,r*.58,0,Math.PI*2);ctx.fill();
  // Hair shorter spikes
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(cx,cy-r*.06,r*.6,Math.PI,0);ctx.fill();
  [[-0.38,-0.95],[-0.12,-1.12],[0.1,-1.08],[0.3,-0.9],[0.48,-0.7]].forEach(s=>{
    ctx.beginPath();ctx.moveTo(cx+s[0]*r-r*.06,cy-r*.48);
    ctx.quadraticCurveTo(cx+s[0]*r,cy+s[1]*r*.85,cx+s[0]*r+r*.04,cy+s[1]*r);
    ctx.quadraticCurveTo(cx+s[0]*r+r*.14,cy+s[1]*r*.75,cx+s[0]*r+r*.16,cy-r*.48);
    ctx.closePath();ctx.fill();
  });
  // Bangs
  ctx.beginPath();ctx.moveTo(cx-r*.48,cy-r*.15);
  ctx.quadraticCurveTo(cx-r*.25,cy-r*.05,cx,cy-r*.1);
  ctx.quadraticCurveTo(cx+r*.25,cy-r*.05,cx+r*.45,cy-r*.18);
  ctx.lineTo(cx+r*.55,cy-r*.2);ctx.arc(cx,cy-r*.06,r*.58,-.28,Math.PI+.28,true);ctx.closePath();ctx.fill();
  // Big eyes
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(cx-r*.2,cy+r*.06,r*.14,r*.11,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+r*.2,cy+r*.06,r*.14,r*.11,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(cx-r*.18,cy+r*.07,r*.07,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+r*.18,cy+r*.07,r*.07,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(cx-r*.15,cy+r*.04,r*.028,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+r*.2,cy+r*.04,r*.028,0,Math.PI*2);ctx.fill();
  // Gentle brows
  ctx.strokeStyle='#111';ctx.lineWidth=r*.05;
  ctx.beginPath();ctx.moveTo(cx-r*.3,cy-r*.08);ctx.lineTo(cx-r*.08,cy-r*.1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+r*.08,cy-r*.1);ctx.lineTo(cx+r*.3,cy-r*.08);ctx.stroke();
  // Smile
  ctx.strokeStyle='#8B4513';ctx.lineWidth=r*.035;
  ctx.beginPath();ctx.arc(cx,cy+r*.2,r*.12,.15,Math.PI-.15);ctx.stroke();
}

function drawPiccolo(ctx,cx,cy,sz){
  const r=sz*.42;
  // Neck green
  ctx.fillStyle='#388E3C';ctx.fillRect(cx-r*.18,cy+r*.42,r*.36,r*.42);
  // White cape
  ctx.fillStyle='#E8E0D0';
  ctx.beginPath();ctx.moveTo(cx-r*.72,cy+r*.85);ctx.lineTo(cx+r*.72,cy+r*.85);ctx.lineTo(cx+r*.55,cy+r*.38);ctx.lineTo(cx,cy+r*.55);ctx.lineTo(cx-r*.55,cy+r*.38);ctx.closePath();ctx.fill();
  // Purple gi peek
  ctx.fillStyle='#6A1B9A';
  ctx.beginPath();ctx.moveTo(cx-r*.25,cy+r*.5);ctx.lineTo(cx+r*.25,cy+r*.5);ctx.lineTo(cx+r*.2,cy+r*.85);ctx.lineTo(cx-r*.2,cy+r*.85);ctx.closePath();ctx.fill();
  // GREEN face
  ctx.fillStyle='#4CAF50';ctx.beginPath();ctx.arc(cx,cy+r*.05,r*.55,0,Math.PI*2);ctx.fill();
  // Darker patches
  ctx.fillStyle='#388E3C';
  ctx.beginPath();ctx.ellipse(cx-r*.15,cy-r*.12,r*.12,r*.08,.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+r*.2,cy-r*.15,r*.1,r*.07,-.2,0,Math.PI*2);ctx.fill();
  // Turban
  ctx.fillStyle='#E8E0D0';
  ctx.beginPath();ctx.moveTo(cx-r*.58,cy-r*.22);
  ctx.quadraticCurveTo(cx-r*.65,cy-r*.8,cx,cy-r*.88);
  ctx.quadraticCurveTo(cx+r*.65,cy-r*.8,cx+r*.58,cy-r*.22);
  ctx.quadraticCurveTo(cx+r*.5,cy-r*.08,cx,cy-r*.18);
  ctx.quadraticCurveTo(cx-r*.5,cy-r*.08,cx-r*.58,cy-r*.22);ctx.closePath();ctx.fill();
  // Turban lines
  ctx.strokeStyle='#BFAA80';ctx.lineWidth=r*.025;
  ctx.beginPath();ctx.moveTo(cx-r*.42,cy-r*.35);ctx.quadraticCurveTo(cx,cy-r*.45,cx+r*.42,cy-r*.35);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-r*.48,cy-r*.5);ctx.quadraticCurveTo(cx,cy-r*.6,cx+r*.48,cy-r*.5);ctx.stroke();
  // Antennae
  ctx.strokeStyle='#4CAF50';ctx.lineWidth=r*.045;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cx-r*.05,cy-r*.82);ctx.quadraticCurveTo(cx-r*.12,cy-r*1.15,cx-r*.08,cy-r*1.32);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+r*.05,cy-r*.82);ctx.quadraticCurveTo(cx+r*.12,cy-r*1.15,cx+r*.08,cy-r*1.32);ctx.stroke();
  ctx.lineCap='butt';
  // Pointy ears
  ctx.fillStyle='#4CAF50';
  ctx.beginPath();ctx.moveTo(cx-r*.5,cy);ctx.lineTo(cx-r*.85,cy-r*.08);ctx.lineTo(cx-r*.48,cy+r*.15);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(cx+r*.5,cy);ctx.lineTo(cx+r*.85,cy-r*.08);ctx.lineTo(cx+r*.48,cy+r*.15);ctx.closePath();ctx.fill();
  // Inner ears pink
  ctx.fillStyle='#E91E63';
  ctx.beginPath();ctx.moveTo(cx-r*.52,cy+r*.02);ctx.lineTo(cx-r*.72,cy-r*.04);ctx.lineTo(cx-r*.5,cy+r*.1);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(cx+r*.52,cy+r*.02);ctx.lineTo(cx+r*.72,cy-r*.04);ctx.lineTo(cx+r*.5,cy+r*.1);ctx.closePath();ctx.fill();
  // Eyes
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(cx-r*.18,cy+r*.06,r*.1,r*.07,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+r*.18,cy+r*.06,r*.1,r*.07,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(cx-r*.17,cy+r*.07,r*.05,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+r*.17,cy+r*.07,r*.05,0,Math.PI*2);ctx.fill();
  // Brow ridges
  ctx.strokeStyle='#2E7D32';ctx.lineWidth=r*.07;
  ctx.beginPath();ctx.moveTo(cx-r*.3,cy-r*.02);ctx.lineTo(cx-r*.06,cy-r*.06);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+r*.06,cy-r*.06);ctx.lineTo(cx+r*.3,cy-r*.02);ctx.stroke();
  // Stern mouth
  ctx.strokeStyle='#1B5E20';ctx.lineWidth=r*.035;
  ctx.beginPath();ctx.moveTo(cx-r*.1,cy+r*.25);ctx.lineTo(cx+r*.1,cy+r*.25);ctx.stroke();
}

function drawFrieza(ctx,cx,cy,sz){

const DFN={goku:drawGoku,vegeta:drawVegeta,gohan:drawGohan,piccolo:drawPiccolo,frieza:drawFrieza,dragonball:drawDragonBall,trunks:drawTrunks};

/* ═══════════════ PRERENDER GEMS ═══════════════ */
const gemC={};
function prerenderGems(sz){
  TYPES.forEach(t=>{
    const cv=document.createElement('canvas');cv.width=sz;cv.height=sz;
    const ctx=cv.getContext('2d');
    const cols=TC[t];
    const g=ctx.createRadialGradient(sz*.38,sz*.32,sz*.05,sz/2,sz/2,sz*.45);
    g.addColorStop(0,cols[2]);g.addColorStop(.6,cols[1]);g.addColorStop(1,cols[0]);
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(sz/2,sz/2,sz*.44,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=cols[0];ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(sz/2,sz/2,sz*.44,0,Math.PI*2);ctx.stroke();
    DFN[t](ctx,sz/2,sz/2,sz);
    gemC[t]=cv;
  });
}

/* ═══════════════ BOARD LOGIC ═══════════════ */
function initBoard(){
  const L=LEVELS[curLev];bRows=L.r;bCols=L.c;
  const types=TYPES.slice(0,L.n);board=[];
  for(let r=0;r<bRows;r++){board[r]=[];
    for(let c=0;c<bCols;c++){
      let t;do{t=types[~~(Math.random()*types.length)];}while(
        (c>=2&&board[r][c-1]?.type===t&&board[r][c-2]?.type===t)||
        (r>=2&&board[r-1]?.[c]?.type===t&&board[r-2]?.[c]?.type===t));
      board[r][c]={type:t,sp:null,x:c,y:r,ox:0,oy:0,sc:1,al:1};
    }
  }
  score=0;movesLeft=L.m;kiPower=0;collected=0;
  colTarget=L.col?L.col.cnt:0;colType=L.col?L.col.type:'';
  combo=0;sel=null;anim=false;swapA=null;particles=[];comboTxts=[];
}

function calcLayout(){
  const L=LEVELS[curLev];
  const hudH=92,kiH=55,pad=14;
  const maxW=W-pad*2,maxH=H-hudH-kiH-pad;
  cz=Math.min(Math.floor(maxW/L.c),Math.floor(maxH/L.r),56);
  bx=(W-cz*L.c)/2;by=hudH+(maxH-cz*L.r)/2;
  prerenderGems(cz);
}

function findMatches(){
  const ms=[];
  for(let r=0;r<bRows;r++){let run=1;
    for(let c=1;c<=bCols;c++){
      if(c<bCols&&board[r][c]&&board[r][c-1]&&board[r][c].type===board[r][c-1].type){run++;}
      else{if(run>=3){const m=[];for(let i=c-run;i<c;i++)m.push({r,c:i});ms.push(m);}run=1;}
    }
  }
  for(let c=0;c<bCols;c++){let run=1;
    for(let r=1;r<=bRows;r++){
      if(r<bRows&&board[r][c]&&board[r-1][c]&&board[r][c].type===board[r-1][c].type){run++;}
      else{if(run>=3){const m=[];for(let i=r-run;i<r;i++)m.push({r:i,c});ms.push(m);}run=1;}
    }
  }
  return ms;
}

function hasValidMoves(){
  for(let r=0;r<bRows;r++)for(let c=0;c<bCols;c++){
    if(c<bCols-1){swap(r,c,r,c+1);if(findMatches().length>0){swap(r,c,r,c+1);return true;}swap(r,c,r,c+1);}
    if(r<bRows-1){swap(r,c,r+1,c);if(findMatches().length>0){swap(r,c,r+1,c);return true;}swap(r,c,r+1,c);}
  }return false;
}

function shuffleBoard(){
  const types=TYPES.slice(0,LEVELS[curLev].n);
  let attempts=0;
  do{for(let r=0;r<bRows;r++)for(let c=0;c<bCols;c++){
    board[r][c].type=types[~~(Math.random()*types.length)];board[r][c].sp=null;}
    attempts++;
  }while((findMatches().length>0||!hasValidMoves())&&attempts<500);
}

function swap(r1,c1,r2,c2){
  const t=board[r1][c1];board[r1][c1]=board[r2][c2];board[r2][c2]=t;
  if(board[r1][c1]){board[r1][c1].x=c1;board[r1][c1].y=r1;}
  if(board[r2][c2]){board[r2][c2].x=c2;board[r2][c2].y=r2;}
}

function activateSpecial(r,c){
  const g=board[r][c];if(!g||!g.sp)return[];const d=[];
  if(g.sp==='kh'){for(let cc=0;cc<bCols;cc++)if(board[r][cc])d.push({r,c:cc});}
  else if(g.sp==='kv'){for(let rr=0;rr<bRows;rr++)if(board[rr][c])d.push({r:rr,c});}
  else if(g.sp==='sb'){for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    const nr=r+dr,nc=c+dc;if(nr>=0&&nr<bRows&&nc>=0&&nc<bCols&&board[nr][nc])d.push({r:nr,c:nc});}}
  if(d.length)sndSpecial();shakeTm=.2;flashTm=.15;return d;
}

function spawnParticles(r,c,type){
  const px=bx+c*cz+cz/2,py=by+r*cz+cz/2;const col=TC[type];
  for(let i=0;i<7;i++){const a=Math.random()*Math.PI*2,sp=80+Math.random()*130;
    particles.push({x:px,y:py,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:.7,color:col[1],sz:2.5+Math.random()*3});
  }
}

function resolveMatches(){
  const ms=findMatches();if(!ms.length)return false;
  combo++;
  if(combo>1){sndCombo();comboTxts.push({text:`COMBO x${combo}!`,y:by+bRows*cz/2,tm:1.3,sc:0});}else sndMatch();
  const rem=new Set();const extras=[];
  ms.forEach(m=>{
    const isH=m.length>1&&m[0].r===m[1].r;
    if(m.length===4){const mid=m[~~(m.length/2)];board[mid.r][mid.c].sp=isH?'kh':'kv';}
    else if(m.length>=5){const mid=m[~~(m.length/2)];board[mid.r][mid.c].sp='sb';}
    m.forEach(p=>{if(board[p.r]?.[p.c]?.sp){activateSpecial(p.r,p.c).forEach(e=>extras.push(e));}rem.add(p.r+','+p.c);});
  });
  extras.forEach(e=>rem.add(e.r+','+e.c));
  rem.forEach(k=>{const[r,c]=k.split(',').map(Number);const g=board[r][c];
    if(g){score+=50*combo;kiPower=Math.min(100,kiPower+3);
      if(colType&&g.type===colType)collected++;
      spawnParticles(r,c,g.type);board[r][c]=null;}
  });
  return true;
}

function applyGravity(){
  let fell=false;const types=TYPES.slice(0,LEVELS[curLev].n);
  for(let c=0;c<bCols;c++){let empty=0;
    for(let r=bRows-1;r>=0;r--){
      if(!board[r][c])empty++;
      else if(empty>0){board[r+empty][c]=board[r][c];board[r+empty][c].y=r+empty;board[r+empty][c].oy=-empty*cz;board[r][c]=null;fell=true;}
    }
    for(let i=0;i<empty;i++){const t=types[~~(Math.random()*types.length)];
      board[i][c]={type:t,sp:null,x:c,y:i,ox:0,oy:-(empty-i)*cz,sc:1,al:1};fell=true;}
  }return fell;
}

function resolveAndSettle(){
  if(resolveMatches()){setTimeout(()=>{applyGravity();setTimeout(resolveAndSettle,180);},220);}
  else{combo=0;anim=false;if(!hasValidMoves())shuffleBoard();checkWinLose();}
}

function checkWinLose(){
  const L=LEVELS[curLev];
  const tMet=score>=L.t,cMet=!L.col||collected>=L.col.cnt;
  if(tMet&&cMet){state='win';sndWin();
    const sr=score/L.t;const stars=sr>=2?3:sr>=1.5?2:1;
    if(!save.stars[curLev]||save.stars[curLev]<stars)save.stars[curLev]=stars;
    if(!save.scores[curLev]||save.scores[curLev]<score)save.scores[curLev]=score;
    if(curLev+1<25&&save.unlocked<=curLev+1)save.unlocked=curLev+2;writeSave();
  }else if(movesLeft<=0){state='lose';sndLose();}
}

function activateKiPower(){
  kiPower=0;sndSpecial();shakeTm=.3;flashTm=.2;
  const cells=[];for(let r=0;r<bRows;r++)for(let c=0;c<bCols;c++)if(board[r][c])cells.push({r,c});
  for(let i=cells.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[cells[i],cells[j]]=[cells[j],cells[i]];}
  cells.slice(0,Math.min(8,cells.length)).forEach(({r,c})=>{const g=board[r][c];
    if(g){score+=50;if(colType&&g.type===colType)collected++;spawnParticles(r,c,g.type);
      for(let i=0;i<5;i++){const a=Math.random()*Math.PI*2;particles.push({x:bx+c*cz+cz/2,y:by+r*cz+cz/2,vx:Math.cos(a)*160,vy:Math.sin(a)*160,life:.9,color:'#FFD700',sz:4});}
      board[r][c]=null;}
  });
  anim=true;setTimeout(()=>{applyGravity();setTimeout(resolveAndSettle,200);},120);
}

/* ═══════════════ INPUT ═══════════════ */
function gemAt(px,py){const c=~~((px-bx)/cz),r=~~((py-by)/cz);return(r>=0&&r<bRows&&c>=0&&c<bCols)?{r,c}:null;}

function trySwap(r1,c1,r2,c2){
  if(anim||Math.abs(r1-r2)+Math.abs(c1-c2)!==1)return;
  anim=true;sndSwap();swapA={r1,c1,r2,c2,t:0,ph:'swap'};
}

function pDown(px,py){
  ensureAudio();
  if(state==='title')return titleClick(px,py);
  if(state==='levels')return levelsClick(px,py);
  if(state==='win'||state==='lose')return endClick(px,py);
  if(state!=='game'||anim)return;
  // Ki button
  if(kiPower>=100){const ky=by+bRows*cz+36;if(Math.abs(px-W/2)<70&&Math.abs(py-ky)<18){activateKiPower();return;}}
  const g=gemAt(px,py);if(!g){sel=null;return;}
  if(sel){if(sel.r===g.r&&sel.c===g.c){sel=null;return;}
    if(Math.abs(sel.r-g.r)+Math.abs(sel.c-g.c)===1){trySwap(sel.r,sel.c,g.r,g.c);sel=null;}else sel=g;
  }else{sel=g;tStart={px,py,r:g.r,c:g.c};sndClick();}
}

function pMove(px,py){
  if(!tStart||anim||state!=='game')return;
  const dx=px-tStart.px,dy=py-tStart.py;
  if(Math.sqrt(dx*dx+dy*dy)>cz*.3){
    let dr=0,dc=0;if(Math.abs(dx)>Math.abs(dy))dc=dx>0?1:-1;else dr=dy>0?1:-1;
    const nr=tStart.r+dr,nc=tStart.c+dc;
    if(nr>=0&&nr<bRows&&nc>=0&&nc<bCols){trySwap(tStart.r,tStart.c,nr,nc);sel=null;}
    tStart=null;
  }
}

C.addEventListener('pointerdown',e=>{e.preventDefault();pDown(e.clientX,e.clientY);});
C.addEventListener('pointermove',e=>{e.preventDefault();pMove(e.clientX,e.clientY);});
C.addEventListener('pointerup',e=>{e.preventDefault();tStart=null;});

/* ═══════════════ TITLE SCREEN ═══════════════ */
function initTitle(){
  state='title';titleParts=[];titleBalls=[];
  for(let i=0;i<35;i++)titleParts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*30,vy:-15-Math.random()*35,life:2+Math.random()*3,ml:2+Math.random()*3,color:['#FFD700','#FF6B00','#FF4500','#00BFFF','#9C27B0'][~~(Math.random()*5)],sz:2+Math.random()*3});
  for(let i=0;i<7;i++)titleBalls.push({x:W*.15+Math.random()*W*.7,y:H*.35+Math.random()*H*.3,vx:(Math.random()-.5)*18,vy:(Math.random()-.5)*12,stars:1+~~(Math.random()*7),sz:16+Math.random()*12,ph:Math.random()*Math.PI*2});
}

function titleClick(px,py){
  const bW=180,bH=50;
  if(px>W/2-bW/2&&px<W/2+bW/2&&py>H*.62-bH/2&&py<H*.62+bH/2){sndClick();state='levels';return;}
  if(save.unlocked>1&&px>W/2-bW/2&&px<W/2+bW/2&&py>H*.73-bH/2&&py<H*.73+bH/2){sndClick();state='levels';return;}
}

function drawTitle(){
  const bg=X.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#080018');bg.addColorStop(.5,'#180038');bg.addColorStop(1,'#000010');
  X.fillStyle=bg;X.fillRect(0,0,W,H);
  // Particles
  titleParts.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
    if(p.life<=0){p.x=Math.random()*W;p.y=H+10;p.life=p.ml;}
    X.globalAlpha=p.life/p.ml*.7;X.fillStyle=p.color;X.beginPath();X.arc(p.x,p.y,p.sz,0,Math.PI*2);X.fill();});
  X.globalAlpha=1;
  // Dragon Balls floating
  titleBalls.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;b.ph+=dt;
    if(b.x<20||b.x>W-20)b.vx*=-1;if(b.y<H*.2||b.y>H*.78)b.vy*=-1;
    const s=b.sz+Math.sin(b.ph*2)*3;X.globalAlpha=.3;
    const g=X.createRadialGradient(b.x,b.y,s*.2,b.x,b.y,s);g.addColorStop(0,'#FFB300');g.addColorStop(.7,'#FF8F00');g.addColorStop(1,'#E65100');
    X.fillStyle=g;X.beginPath();X.arc(b.x,b.y,s,0,Math.PI*2);X.fill();
    X.fillStyle='rgba(200,30,30,0.5)';const sr=s*.12;
    for(let i=0;i<Math.min(b.stars,4);i++){X.beginPath();X.arc(b.x+(i-1.5)*s*.25,b.y,sr,0,Math.PI*2);X.fill();}
    X.globalAlpha=1;
  });
  // Title
  X.save();X.textAlign='center';X.textBaseline='middle';
  const ty=H*.25;
  const fs1=Math.min(W*.11,48);
  X.font=`bold ${fs1}px Arial`;X.shadowColor='#FF6B00';X.shadowBlur=25;X.fillStyle='#FF9800';
  X.fillText('DRAGON BALL Z',W/2,ty);X.shadowBlur=45;X.fillText('DRAGON BALL Z',W/2,ty);X.shadowBlur=0;
  X.strokeStyle='#BF360C';X.lineWidth=2;X.strokeText('DRAGON BALL Z',W/2,ty);
  const fs2=Math.min(W*.075,36);
  X.font=`bold ${fs2}px Arial`;X.shadowColor='#FFD700';X.shadowBlur=18;X.fillStyle='#FFD700';
  X.fillText("LORI'S CRUSH",W/2,ty+fs1*.9);X.shadowBlur=0;
  X.strokeStyle='#BF8C00';X.lineWidth=1.5;X.strokeText("LORI'S CRUSH",W/2,ty+fs1*.9);
  X.restore();
  // Buttons
  drawBtn(W/2,H*.62,180,50,'SPELEN','#E65100','#FF8F00');
  if(save.unlocked>1)drawBtn(W/2,H*.73,180,50,'DOORGAAN','#1565C0','#1E88E5');
  X.fillStyle='rgba(255,255,255,.25)';X.font='11px Arial';X.textAlign='center';X.fillText('v1.0',W/2,H-16);
}

function drawBtn(x,y,w,h,text,c1,c2){
  const g=X.createLinearGradient(x-w/2,y-h/2,x-w/2,y+h/2);g.addColorStop(0,c2);g.addColorStop(1,c1);
  X.fillStyle=g;X.beginPath();X.roundRect(x-w/2,y-h/2,w,h,12);X.fill();
  X.strokeStyle='rgba(255,255,255,.3)';X.lineWidth=2;X.beginPath();X.roundRect(x-w/2,y-h/2,w,h,12);X.stroke();
  X.fillStyle='#fff';X.font=`bold ${h*.4}px Arial`;X.textAlign='center';X.textBaseline='middle';X.fillText(text,x,y);
}

/* ═══════════════ LEVEL SELECT ═══════════════ */
function levelsClick(px,py){
  if(px<70&&py<55){sndClick();state='title';return;}
  const gW=Math.min(W-16,320),bsz=gW/5,sx=(W-gW)/2,sy=78;
  for(let i=0;i<25;i++){const row=~~(i/5),col=i%5;
    const lx=sx+col*bsz+bsz/2,ly=sy+row*(bsz+10)+bsz/2;
    if(px>lx-bsz/2&&px<lx+bsz/2&&py>ly-bsz/2&&py<ly+bsz/2){
      if(i<save.unlocked){sndClick();curLev=i;startGame();}return;}
  }
}

function drawLevels(){
  const bg=X.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#080018');bg.addColorStop(1,'#180038');
  X.fillStyle=bg;X.fillRect(0,0,W,H);
  X.fillStyle='#FFD700';X.font='bold 22px Arial';X.textAlign='center';X.textBaseline='middle';X.fillText('KIES JE LEVEL',W/2,32);
  X.fillStyle='#fff';X.font='bold 15px Arial';X.textAlign='left';X.fillText('\u2190 TERUG',10,32);
  const sagas=['Aarde Saga','Saiyan Saga','Namek Saga','Cell Saga','Buu Saga'];
  const gW=Math.min(W-16,320),bsz=gW/5,sx=(W-gW)/2,sy=78;
  for(let i=0;i<25;i++){const row=~~(i/5),col=i%5;
    const lx=sx+col*bsz+bsz/2,ly=sy+row*(bsz+10)+bsz/2;
    if(col===0){X.fillStyle='rgba(255,165,0,.65)';X.font='bold 10px Arial';X.textAlign='left';X.fillText(sagas[row],sx,ly-bsz/2-4);}
    const unlocked=i<save.unlocked,stars=save.stars[i]||0;
    if(unlocked){
      const g=X.createRadialGradient(lx,ly,0,lx,ly,bsz*.45);g.addColorStop(0,'#2a1f5e');g.addColorStop(1,'#1a0a3e');
      X.fillStyle=g;X.beginPath();X.roundRect(lx-bsz/2+2,ly-bsz/2+2,bsz-4,bsz-4,8);X.fill();
      X.strokeStyle=`hsla(${(i*28)%360},80%,55%,.55)`;X.lineWidth=2;X.beginPath();X.roundRect(lx-bsz/2+2,ly-bsz/2+2,bsz-4,bsz-4,8);X.stroke();
      X.fillStyle='#fff';X.font=`bold ${bsz*.35}px Arial`;X.textAlign='center';X.textBaseline='middle';X.fillText(i+1,lx,ly-3);
      for(let s=0;s<3;s++){X.fillStyle=s<stars?'#FFD700':'#444';X.font=`${bsz*.2}px Arial`;X.fillText('\u2605',lx+(s-1)*bsz*.22,ly+bsz*.27);}
    }else{
      X.fillStyle='#151525';X.beginPath();X.roundRect(lx-bsz/2+2,ly-bsz/2+2,bsz-4,bsz-4,8);X.fill();
      X.strokeStyle='#333';X.lineWidth=1;X.beginPath();X.roundRect(lx-bsz/2+2,ly-bsz/2+2,bsz-4,bsz-4,8);X.stroke();
      X.fillStyle='#555';X.font=`${bsz*.3}px Arial`;X.textAlign='center';X.textBaseline='middle';X.fillText('\uD83D\uDD12',lx,ly);
    }
  }
}

/* ═══════════════ GAME ═══════════════ */
function startGame(){state='game';initBoard();calcLayout();}

function drawBg(){
  const lv=curLev;let g;
  if(lv<5){g=X.createLinearGradient(0,0,0,H);g.addColorStop(0,'#87CEEB');g.addColorStop(.4,'#5DADE2');g.addColorStop(.6,'#27AE60');g.addColorStop(1,'#1E8449');}
  else if(lv<10){g=X.createLinearGradient(0,0,0,H);g.addColorStop(0,'#D35400');g.addColorStop(.3,'#A04000');g.addColorStop(.7,'#6E2C00');g.addColorStop(1,'#4A1A00');}
  else if(lv<15){g=X.createLinearGradient(0,0,0,H);g.addColorStop(0,'#2ECC71');g.addColorStop(.3,'#1ABC9C');g.addColorStop(.7,'#148F77');g.addColorStop(1,'#0E6655');}
  else if(lv<20){g=X.createLinearGradient(0,0,0,H);g.addColorStop(0,'#ECF0F1');g.addColorStop(.5,'#D5DBDB');g.addColorStop(1,'#BDC3C7');}
  else{g=X.createLinearGradient(0,0,0,H);g.addColorStop(0,'#8E44AD');g.addColorStop(.4,'#6C3483');g.addColorStop(.7,'#4A235A');g.addColorStop(1,'#2C003E');}
  X.fillStyle=g;X.fillRect(0,0,W,H);
  if(lv>=15&&lv<20){X.strokeStyle='rgba(0,0,0,.04)';X.lineWidth=1;const ts=36;
    for(let x=0;x<W;x+=ts){X.beginPath();X.moveTo(x,H*.6);X.lineTo(x,H);X.stroke();}
    for(let y=H*.6;y<H;y+=ts){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}}
  if(lv>=20){X.globalAlpha=.2;X.fillStyle='#E91E63';X.beginPath();X.arc(W*.82,H*.12,28,0,Math.PI*2);X.fill();
    X.fillStyle='#FF9800';X.beginPath();X.arc(W*.15,H*.22,18,0,Math.PI*2);X.fill();X.globalAlpha=1;}
}

function drawHUD(){
  const L=LEVELS[curLev];
  X.fillStyle='rgba(0,0,0,.72)';X.fillRect(0,0,W,88);
  // Level name
  X.fillStyle='#FFD700';X.font='bold 13px Arial';X.textAlign='center';X.textBaseline='middle';
  X.fillText(`Level ${curLev+1}: ${L.name}`,W/2,14);
  // Score left
  X.fillStyle='#FFD700';X.font='bold 20px Arial';X.textAlign='left';X.fillText(`${score}`,12,42);
  X.fillStyle='rgba(255,215,0,.55)';X.font='10px Arial';X.fillText('Score',12,56);
  // Moves right
  X.fillStyle='#42A5F5';X.font='bold 20px Arial';X.textAlign='right';X.fillText(`${movesLeft}`,W-12,42);
  X.fillStyle='rgba(66,165,245,.55)';X.font='10px Arial';X.fillText('Zetten',W-12,56);
  // Progress bar
  const bW=W-24,bH=10,bX=12,bY=70;
  X.fillStyle='rgba(255,255,255,.12)';X.beginPath();X.roundRect(bX,bY,bW,bH,5);X.fill();
  const pr=Math.min(1,score/L.t);
  if(pr>0){const pg=X.createLinearGradient(bX,0,bX+bW*pr,0);pg.addColorStop(0,'#FF6D00');pg.addColorStop(1,'#FFD700');
    X.fillStyle=pg;X.beginPath();X.roundRect(bX,bY,bW*pr,bH,5);X.fill();}
  X.fillStyle='rgba(255,255,255,.4)';X.font='8px Arial';X.textAlign='right';X.fillText(`${L.t}`,bX+bW,bY-2);
  // Collect
  if(L.col){X.fillStyle='#fff';X.font='bold 12px Arial';X.textAlign='center';
    X.fillText(`${L.col.type.charAt(0).toUpperCase()+L.col.type.slice(1)}: ${collected}/${L.col.cnt}`,W/2,42);}
}

function drawKiBar(){
  const ky=by+bRows*cz+14,kW=Math.min(W-36,250),kX=(W-kW)/2,kH=22;
  X.fillStyle='rgba(0,0,0,.5)';X.beginPath();X.roundRect(kX-4,ky-4,kW+8,kH+8,8);X.fill();
  X.fillStyle='rgba(255,255,255,.08)';X.beginPath();X.roundRect(kX,ky,kW,kH,6);X.fill();
  const kf=kiPower/100;
  if(kf>0){const kg=X.createLinearGradient(kX,0,kX+kW*kf,0);kg.addColorStop(0,'#FF6D00');kg.addColorStop(.5,'#FFD700');kg.addColorStop(1,'#FFEB3B');
    X.fillStyle=kg;X.beginPath();X.roundRect(kX,ky,kW*kf,kH,6);X.fill();}
  if(kiPower>=100){X.strokeStyle=`rgba(255,215,0,${.4+Math.sin(time*6)*.3})`;X.lineWidth=3;X.beginPath();X.roundRect(kX-2,ky-2,kW+4,kH+4,8);X.stroke();}
  X.fillStyle='#fff';X.font='bold 11px Arial';X.textAlign='center';X.textBaseline='middle';
  X.fillText(kiPower>=100?'KI POWER! TAP!':'Ki Power: '+~~kiPower+'%',W/2,ky+kH/2);
}

function drawBoard(){
  // Board bg
  X.fillStyle='rgba(0,0,0,.28)';X.beginPath();X.roundRect(bx-4,by-4,bCols*cz+8,bRows*cz+8,8);X.fill();
  // Grid lines
  X.strokeStyle='rgba(255,255,255,.04)';X.lineWidth=1;
  for(let r=0;r<=bRows;r++){X.beginPath();X.moveTo(bx,by+r*cz);X.lineTo(bx+bCols*cz,by+r*cz);X.stroke();}
  for(let c=0;c<=bCols;c++){X.beginPath();X.moveTo(bx+c*cz,by);X.lineTo(bx+c*cz,by+bRows*cz);X.stroke();}
  // Gems
  for(let r=0;r<bRows;r++)for(let c=0;c<bCols;c++){
    const gem=board[r][c];if(!gem)continue;
    // Animate fall
    if(gem.oy!==0){gem.oy*=.72;if(Math.abs(gem.oy)<.5)gem.oy=0;}
    if(gem.ox!==0){gem.ox*=.72;if(Math.abs(gem.ox)<.5)gem.ox=0;}
    let px=bx+c*cz+gem.ox,py=by+r*cz+gem.oy;
    // Swap anim
    if(swapA){const{r1,c1,r2,c2,t:st}=swapA;
      if(r===r1&&c===c1){px=bx+(c1+(c2-c1)*st)*cz;py=by+(r1+(r2-r1)*st)*cz;}
      else if(r===r2&&c===c2){px=bx+(c2+(c1-c2)*st)*cz;py=by+(r2+(r1-r2)*st)*cz;}}
    X.save();X.globalAlpha=gem.al;
    // Selected aura
    if(sel&&sel.r===r&&sel.c===c){
      const as=cz*.48+Math.sin(time*8)*cz*.06;
      X.strokeStyle=AURA[gem.type];X.lineWidth=3;X.globalAlpha=.7;
      X.beginPath();X.arc(px+cz/2,py+cz/2,as,0,Math.PI*2);X.stroke();
      X.strokeStyle=`rgba(255,255,255,${.3+Math.sin(time*10)*.2})`;X.lineWidth=2;
      X.beginPath();X.arc(px+cz/2,py+cz/2,as+3,0,Math.PI*2);X.stroke();
      X.globalAlpha=gem.al;}
    // Draw gem image
    if(gemC[gem.type]){const s=gem.sc,sz=cz*s;X.drawImage(gemC[gem.type],px+(cz-sz)/2,py+(cz-sz)/2,sz,sz);}
    // Special indicator
    if(gem.sp){X.fillStyle='rgba(255,255,255,.85)';X.font=`bold ${cz*.26}px Arial`;X.textAlign='center';X.textBaseline='middle';
      if(gem.sp==='kh')X.fillText('\u2194',px+cz/2,py+cz*.84);
      else if(gem.sp==='kv')X.fillText('\u2195',px+cz/2,py+cz*.84);
      else if(gem.sp==='sb'){X.fillStyle=`rgba(255,215,0,${.5+Math.sin(time*6)*.3})`;X.fillText('\u2738',px+cz/2,py+cz*.84);}}
    X.restore();
  }
}

function drawParticles(){
  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=200*dt;p.life-=dt;
    X.globalAlpha=Math.max(0,p.life/.8);X.fillStyle=p.color;X.beginPath();X.arc(p.x,p.y,p.sz,0,Math.PI*2);X.fill();});
  X.globalAlpha=1;particles=particles.filter(p=>p.life>0);
}

function drawComboTxts(){
  comboTxts.forEach(ct=>{ct.tm-=dt;ct.y-=55*dt;if(ct.sc<1)ct.sc+=dt*5;if(ct.sc>1)ct.sc=1;
    X.save();X.globalAlpha=Math.min(1,ct.tm);X.font=`bold ${28*ct.sc}px Arial`;X.textAlign='center';X.textBaseline='middle';
    X.fillStyle='#FFD700';X.shadowColor='#FF6B00';X.shadowBlur=10;X.fillText(ct.text,W/2,ct.y);X.restore();});
  comboTxts=comboTxts.filter(ct=>ct.tm>0);
}

/* ═══════════════ WIN/LOSE ═══════════════ */
function drawWin(){
  drawBg();drawBoard();drawHUD();
  X.fillStyle='rgba(0,0,0,.6)';X.fillRect(0,0,W,H);
  X.save();X.textAlign='center';X.textBaseline='middle';
  X.font=`bold ${Math.min(W*.12,50)}px Arial`;X.shadowColor='#FFD700';X.shadowBlur=22;X.fillStyle='#FFD700';
  X.fillText('OVERWINNING!',W/2,H*.28);X.shadowBlur=0;
  const L=LEVELS[curLev],sr=score/L.t,es=sr>=2?3:sr>=1.5?2:1;
  X.font='38px Arial';for(let i=0;i<3;i++){X.fillStyle=i<es?'#FFD700':'#555';X.fillText('\u2605',W/2+(i-1)*48,H*.38);}
  X.font='bold 20px Arial';X.fillStyle='#fff';X.fillText(`Score: ${score}`,W/2,H*.48);
  X.restore();
  if(curLev<24)drawBtn(W/2,H*.6,180,48,'VOLGENDE','#E65100','#FF8F00');
  drawBtn(W/2,H*.7,180,48,'LEVELS','#1565C0','#1E88E5');
  drawBtn(W/2,H*.8,180,48,'OPNIEUW','#2E7D32','#43A047');
}

function drawLose(){
  drawBg();drawBoard();drawHUD();
  X.fillStyle='rgba(0,0,0,.6)';X.fillRect(0,0,W,H);
  X.save();X.textAlign='center';X.textBaseline='middle';
  X.font=`bold ${Math.min(W*.1,44)}px Arial`;X.fillStyle='#E74C3C';X.shadowColor='#C0392B';X.shadowBlur=15;
  X.fillText('VERLOREN...',W/2,H*.33);X.shadowBlur=0;
  X.font='bold 18px Arial';X.fillStyle='#aaa';X.fillText(`Score: ${score}`,W/2,H*.43);X.restore();
  drawBtn(W/2,H*.56,180,48,'OPNIEUW','#E65100','#FF8F00');
  drawBtn(W/2,H*.66,180,48,'LEVELS','#1565C0','#1E88E5');
}

function endClick(px,py){
  const bW=180,bH=48;
  if(state==='win'){
    if(curLev<24&&px>W/2-bW/2&&px<W/2+bW/2&&py>H*.6-bH/2&&py<H*.6+bH/2){sndClick();curLev++;startGame();return;}
    if(px>W/2-bW/2&&px<W/2+bW/2&&py>H*.7-bH/2&&py<H*.7+bH/2){sndClick();state='levels';return;}
    if(px>W/2-bW/2&&px<W/2+bW/2&&py>H*.8-bH/2&&py<H*.8+bH/2){sndClick();startGame();return;}
  }else{
    if(px>W/2-bW/2&&px<W/2+bW/2&&py>H*.56-bH/2&&py<H*.56+bH/2){sndClick();startGame();return;}
    if(px>W/2-bW/2&&px<W/2+bW/2&&py>H*.66-bH/2&&py<H*.66+bH/2){sndClick();state='levels';return;}
  }
}

/* ═══════════════ MAIN LOOP ═══════════════ */
function update(){
  if(shakeTm>0)shakeTm-=dt;
  if(flashTm>0)flashTm-=dt;
  if(state==='game'&&swapA){
    swapA.t+=dt*4.5;
    if(swapA.t>=1){swapA.t=1;const{r1,c1,r2,c2,ph}=swapA;
      if(ph==='swap'){swap(r1,c1,r2,c2);
        if(findMatches().length>0){swapA=null;movesLeft--;combo=0;resolveAndSettle();}
        else{swap(r1,c1,r2,c2);swapA={r1:r2,c1:c2,r2:r1,c2:c1,t:0,ph:'back'};}
      }else{swapA=null;anim=false;}}
  }
}

function draw(){
  X.clearRect(0,0,W,H);X.save();
  if(shakeTm>0){const s=shakeTm*22;X.translate((Math.random()-.5)*s,(Math.random()-.5)*s);}
  if(state==='title')drawTitle();
  else if(state==='levels')drawLevels();
  else if(state==='game'){drawBg();drawBoard();drawHUD();drawKiBar();drawParticles();drawComboTxts();}
  else if(state==='win'){drawWin();drawParticles();}
  else if(state==='lose')drawLose();
  X.restore();
  if(flashTm>0){X.fillStyle=`rgba(255,255,255,${flashTm*3.5})`;X.fillRect(0,0,W,H);}
}

function loop(t){
  requestAnimationFrame(loop);
  if(!lt)lt=t;dt=Math.min(.05,(t-lt)/1000);lt=t;time+=dt;
  update();draw();
}

initTitle();requestAnimationFrame(loop);
</script>
